    get:
      operationId: getProfile
      security:
        - firebase: []
      x-google-backend:
        address: https://phonance-profile-647799297855.southamerica-west1.run.app
      responses:
        "200":
          description: OK
    post:
      operationId: postProfile
      security:
        - firebase: []
      x-google-backend:
        address: https://phonance-profile-647799297855.southamerica-west1.run.app
