swagger: "2.0"
info:
  title: phonance-api
  description: API Gateway for Phonance Cloud Run services
  version: 1.0.0

schemes:
  - https
produces:
  - application/json

securityDefinitions:
  firebase:
    type: oauth2
    flow: implicit
    authorizationUrl: ""
    x-google-issuer: "https://securetoken.google.com/phonance-43490"
    x-google-jwks_uri: "https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com"
    x-google-audiences: "phonance-43490"

paths:
